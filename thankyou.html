<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — The Designer's Shift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0C5446;
      --orange: #FF6700;
      --cream: #FCFAEF;
      --sand: #DBD0BD;
      --ink: #1A1A15;
      --serif: 'Young Serif', Georgia, serif;
      --sans: 'Instrument Sans', system-ui, sans-serif;
    }

    body {
      background: var(--teal);
      color: var(--cream);
      font-family: var(--sans);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .stripe {
      height: 5px;
      background: var(--orange);
      flex-shrink: 0;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .mascot {
      width: 280px;
      max-width: 70vw;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.32, 0.72, 0, 1) 0.1s forwards;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) 0.25s forwards;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) 0.35s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--orange);
    }

    .sub {
      font-size: 1.05rem;
      color: rgba(252,250,239,0.65);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) 0.45s forwards;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--orange);
      color: var(--ink);
      padding: 0.85rem 1.75rem;
      border-radius: 100px;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) 0.55s forwards;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    footer {
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .footer-wordmark {
      font-family: var(--serif);
      font-size: 1rem;
      color: rgba(252,250,239,0.5);
    }

    .footer-wordmark span { color: var(--orange); }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="stripe"></div>

  <div class="wrap">
    <img src="assets/mascot-hearthands.png" alt="The Designer's Shift mascot" class="mascot" />
    <p class="eyebrow">Welcome to the shift</p>
    <h1>You're <em>in.</em></h1>
    <p class="sub">Issue 001 lands this Friday. Check your inbox — and if it's not there, check your spam and mark it as not spam.</p>
    <a href="index.html" class="btn-home">Back to home →</a>
  </div>

  <footer>
    <div class="footer-wordmark">The Designer's <span>→</span> Shift</div>
  </footer>

</body>
</html>
